<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      padding: 20px;
    }
    nav {
      display: flex;
      flex-direction: column; 
      gap: 10px;
      margin-bottom: 20px;
    }

    nav a {
      text-decoration: none;
      color: rgb(108, 39, 237);
      font-weight: bold;
    }

    @media (max-width: 768px) {
      nav {
        flex-direction:row;
        gap: 20px;
      }
    }
    img {
      width: 300px;
      border-radius: 50px; 
      margin-bottom: 20px;
    }
    video {
      width: 50%; 
      padding: 10px;
      background-color: green; 
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 10px;
    }

    table th, table td {
      border: 1px solid rgb(230, 96, 96);
      padding: 20px;
      text-align: center;
    }

    table th {
      background-color: rgb(185, 176, 176);
    }

    button {
      background-color: green;
      padding:20px;
      border: none; 
      cursor: pointer;
      margin: 10px;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: rgb(46, 98, 195); 
      color: rgb(175, 90, 90);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); 
      gap: 10px;
      margin-top: 20px;
    }

    .grid div {
      background-color: lightblue;
      padding: 20px;
      text-align: center;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>


  <h1>Welcome to My Responsive Website</h1>

</body>
